server:
  port: ${VOUCHER_SERVICE_PORT:8086}

spring:
  application:
    name: hmdp-voucher-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        server-addr: ${NACOS_ADDR:42.193.185.40:8848}
      config:
        enabled: true
        server-addr: ${NACOS_ADDR:42.193.185.40:8848}
        file-extension: yaml
        shared-configs:
          - data-id: hmdp-common.yaml
            refresh: true
# Voucher 服务特有的 Mapper 配置保留在本地
mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
