server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: hmdp-gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        server-addr: ${NACOS_ADDR:42.193.185.40:8848}
      config:
        enabled: true
        server-addr: ${NACOS_ADDR:42.193.185.40:8848}
        file-extension: yaml
        shared-configs:
          - data-id: hmdp-gateway.yaml
            refresh: true
