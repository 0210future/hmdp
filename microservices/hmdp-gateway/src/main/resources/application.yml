server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: hmdp-gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
    gateway:
      routes:
        - id: user-service
          uri: lb://hmdp-user-service
          predicates:
            - Path=/user/**
        - id: shop-service
          uri: lb://hmdp-shop-service
          predicates:
            - Path=/shop/**,/shop-type/**
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s

logging:
  level:
    com.hmdp: info
