server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: hmdp-gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false
    gateway:
      routes:
        - id: user
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/user/**
  redis:
    host: 42.193.185.40
    port: 6379
    database: 0

auth:
  mode: redis
