server:
  port: ${USER_SERVICE_PORT:8082}

spring:
  application:
    name: hmdp-user-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        server-addr: ${NACOS_ADDR:42.193.185.40:8848}
      config:
        enabled: true
        server-addr: ${NACOS_ADDR:42.193.185.40:8848}
        file-extension: yaml
        shared-configs:
          - data-id: hmdp-common.yaml
            refresh: true
# 以下配置已迁移到 Nacos 配置中心
# spring.datasource, spring.redis, mybatis-plus, logging, auth 等配置请查看 Nacos
# 本地仅保留覆盖配置:
